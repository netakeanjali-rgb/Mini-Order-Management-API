services:
  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/var/www
    environment:
      APP_URL: http://localhost:8000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: mini_order_db
      DB_USERNAME: root
      DB_PASSWORD: secret
      CACHE_STORE: redis
      QUEUE_CONNECTION: database
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MAIL_MAILER: log
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    command: php artisan serve --host=0.0.0.0 --port=8000

  queue:
    build: .
    volumes:
      - .:/var/www
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: mini_order_db
      DB_USERNAME: root
      DB_PASSWORD: secret
      CACHE_STORE: redis
      QUEUE_CONNECTION: database
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MAIL_MAILER: log
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    command: php artisan queue:work --tries=3

  mysql:
    image: mysql:8.0
    ports:
      - "3308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: mini_order_db
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-psecret"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  mysql_data:
